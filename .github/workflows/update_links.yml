name: Update Colab Links
on:
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  update-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push changes back to the repo
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Update Script
        env:
                                                      
          OLD_URL: 'https://github/fcisuez-2018/Quantum-Computing-with-Qiskit-and-IBMQ'
          NEW_URL: 'https://colab.research.google.com/github/fcisuez-2018'
        run: |
          python3 -c "
          import os
          import glob
          
          old_url = os.getenv('OLD_URL')
          new_url = os.getenv('NEW_URL')
          
          # Ensure variables are valid strings
          if not isinstance(old_url, str) or not isinstance(new_url, str):
              print('Error: Environment variables are not set or are not strings.')
              exit(1)

          for filepath in glob.glob('**/README.md', recursive=True):
              try:
                  with open(filepath, 'r', encoding='utf-8') as f:
                      content = f.read()
                  
                  # Skip if content is None or empty
                  if not content:
                      continue
                      
                  if old_url in content:
                      print(f'Updating {filepath}...')
                      new_content = content.replace(old_url, new_url)
                      with open(filepath, 'w', encoding='utf-8') as f:
                          f.write(new_content)
              except Exception as e:
                  print(f'Could not process file {filepath}: {e}')
                  continue
          "
      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          # Check if there are changes to commit
          if ! git diff --quiet --staged; then
            git commit -m 'chore: update colab links'
            # Fetch remote changes and rebase our local changes on top of them
            git pull --rebase origin main
            git push origin main
          fi
