name: Update Colab Links
on:
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  update-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push changes back to the repo
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Update Script
        env:
          OLD_URL: 'https://colab.research.google.com/github/MonitSharma/Learn-Quantum-Computing-with-Qiskit'
          NEW_URL: 'https://colab.research.google.com/github/fcisuez-2018/Learn-Quantum-Computing-with-Qiskit'
        run: |
          python3 -c "
          import os
          import glob
          
          old_url = os.getenv('OLD_URL')
          new_url = os.getenv('NEW_URL')
          
          # Find all .ipynb files recursively
          for filepath in glob.glob('**/*.ipynb', recursive=True):
              with open(filepath, 'r', encoding='utf-8') as f:
                  content = f.read()
              
              if old_user in content:
                  print(f'Updating {filepath}...')
                  new_content = content.replace(old_user, new_user)
                  with open(filepath, 'w', encoding='utf-8') as f:
                      f.write(new_content)
          "

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m 'chore: update colab links' && git push)
